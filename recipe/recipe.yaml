context:
  version: "4.0.3"

package:
  name: pueue
  version: ${{ version }}

source:
  url: https://github.com/Nukesor/pueue/archive/v${{ version }}.tar.gz
  sha256: 4c1acbdbd5260b0b7f76aae7ad142665de664745a7ed63425190e06c0c7478b1

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - pueue --help

about:
  license: MIT
  license_file:
    - LICENSE.MIT
    - LICENSE.APACHE
    - THIRDPARTY.yml
  summary: Command-line tool for managing long-running shell commands
  homepage: https://github.com/Nukesor/pueue
  repository: https://github.com/Nukesor/pueue

extra:
  recipe-maintainers:
    - danielnachun
